<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171e27"/>
      <stop offset="1" stop-color="#0a0d11"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8b13a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#e8b13a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- rounded-rect app tile -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#bg)"/>
  <rect x="100.5" y="100.5" width="823" height="823" rx="184.5" fill="none" stroke="#2a333d" stroke-width="1"/>

  <!-- radar rings + sweep, centered -->
  <g transform="translate(512 528)">
    <circle r="312" fill="none" stroke="#e8b13a" stroke-width="6" opacity="0.22"/>
    <circle r="222" fill="none" stroke="#e8b13a" stroke-width="7" opacity="0.45"/>
    <circle r="132" fill="none" stroke="#e8b13a" stroke-width="8" opacity="0.8"/>

    <!-- sweep wedge pointing up-right -->
    <g transform="rotate(-58)">
      <path d="M0 0 L312 0 A312 312 0 0 0 246 -191 Z" fill="url(#sweep)"/>
      <line x1="0" y1="0" x2="312" y2="0" stroke="#e8b13a" stroke-width="6" opacity="0.85"/>
    </g>

    <!-- home/source dot -->
    <circle r="30" fill="#e8b13a"/>
    <circle r="30" fill="none" stroke="#0a0d11" stroke-width="6"/>
  </g>

  <!-- crescent moon, top-left -->
  <g transform="translate(300 286)">
    <circle r="74" fill="#e8b13a"/>
    <circle r="74" cx="34" cy="-16" fill="url(#bg)"/>
  </g>
</svg>
